<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>PhotoPlanner — Photographer's Planning Tool</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css"/>
  <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="stylesheet" href="dist/style.min.css?v=c7041f39"/>
  <link rel="manifest" href="manifest.json"/>
  <meta name="theme-color" content="#f78166"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="PhotoPlanner"/>
  <!-- CSP is enforced via HTTP response headers when deployed to a server.
       A meta CSP tag is not used here because the app also runs from file://
       during local development, where null-origin breaks CSP matching.
       See deployment guide for recommended server-side CSP header. -->
</head>
<body class="bg-dark text-light">

<!-- ─── Navbar ─────────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-dark bg-body-tertiary border-bottom border-secondary-subtle px-3 py-0" style="height:56px;flex-shrink:0">
  <span class="navbar-brand fw-bold" style="color:#f78166;font-size:1.1rem">
    📷 <span class="brand-name">PhotoPlanner</span>
  </span>
  <div class="nav-tabs-wrap d-flex gap-1">
    <button class="nav-tab btn btn-sm active" data-tab="planner">Planner</button>
    <button class="nav-tab btn btn-sm" data-tab="sunmoon">Sun &amp; Moon</button>
    <button class="nav-tab btn btn-sm" data-tab="milkyway">Milky Way</button>
    <button class="nav-tab btn btn-sm" data-tab="calculators">Calculators</button>
  </div>
  <div class="d-flex gap-1 ms-2">
    <button class="btn btn-sm navbar-icon-btn" id="readme-btn" title="Help &amp; Guide" aria-label="Help">?</button>
    <button class="btn btn-sm navbar-icon-btn" id="about-btn"  title="About PhotoPlanner" aria-label="About">ℹ</button>
  </div>
</nav>

<!-- ─── Tab containers (filled by templates) ──────────────────────────────── -->
<div id="tab-planner"     class="tab-content active"></div>
<div id="tab-sunmoon"     class="tab-content"></div>
<div id="tab-milkyway"    class="tab-content"></div>
<div id="tab-calculators" class="tab-content"></div>

<!-- ─── Modals & overlays (filled by template) ────────────────────────────── -->
<div id="modals-root"></div>
<div id="toast-container" style="position:fixed;bottom:max(1.25rem,env(safe-area-inset-bottom));right:max(1.25rem,env(safe-area-inset-right));z-index:9999;display:flex;flex-direction:column;gap:0.5rem;pointer-events:none"></div>

<!-- ─── External Libraries ────────────────────────────────────────────────── -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/dayjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/utc.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.10/plugin/timezone.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<!-- ─── Application Bundle (minified; built via: npm run build) ───────────── -->
<script src="dist/bundle.min.js?v=83b1c56d"></script>


<script>
  // Service workers require http/https — skip on file:// (local dev)
  if ('serviceWorker' in navigator && location.protocol !== 'file:') {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .catch(err => console.warn('SW registration failed:', err));
    });
    // When a new service worker takes over (after a deploy), reload so the
    // page gets fresh assets instead of running old cached JS.
    let _swReloading = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (_swReloading) return;
      _swReloading = true;
      window.location.reload();
    });
  }
</script>
</body>
</html>
