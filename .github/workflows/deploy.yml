name: Deploy PhotoPlanner to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: PhotoPlanner/package-lock.json

      - name: Install build dependencies
        run: npm ci
        working-directory: PhotoPlanner

      - name: Build (bundle + minify JS)
        run: npm run build
        working-directory: PhotoPlanner

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload PhotoPlanner folder as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: PhotoPlanner/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
